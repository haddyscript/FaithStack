server {
    listen 80;

    # Catch all subdomains: *.faithstack.app and localhost for local dev
    server_name *.faithstack.app faithstack.app localhost;

    root /var/www/public;
    index index.php index.html;

    charset utf-8;

    # Health check
    location = /up {
        try_files $uri /index.php?$query_string;
    }

    # Main routing — send everything through Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass   app:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Block .htaccess access
    location ~ /\.ht {
        deny all;
    }

    # Static asset caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # Logging
    access_log /var/log/nginx/faithstack_access.log;
    error_log  /var/log/nginx/faithstack_error.log;

    client_max_body_size 10M;
}
